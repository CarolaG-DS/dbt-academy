version: 2

models:
  - name: gold_orders
    description: >
      Fact table with one row per order. Aggregates TPC-H orders with customer,
      nation, and line item data. Order status values: O = open, F = fulfilled,
      P = processing. Materialized as an incremental table, updated on each run.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: order_date
        data_tests:
          - not_null
      - name: order_status
        data_tests:
          - accepted_values:
              arguments:
                values: ['O', 'F', 'P']
      - name: order_priority
        data_tests:
          - accepted_values:
              arguments:
                values: ['1-URGENT', '2-HIGH', '3-MEDIUM', '4-NOT SPECIFIED', '5-LOW']
      - name: customer_id
        data_tests:
          - not_null
      - name: market_segment
        data_tests:
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']
      - name: total_items
        data_tests:
          - not_null
      - name: gross_revenue
        data_tests:
          - not_null
      - name: net_revenue
        description: "{{ doc('net_revenue') }}"
        data_tests:
          - not_null
      - name: discount_amount
        data_tests:
          - not_null
      - name: effective_discount_rate
        data_tests:
          - not_null
      - name: order_size_band
        data_tests:
          - accepted_values:
              arguments:
                values: ['Large', 'Medium', 'Small']

  - name: gold_customers
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: customer_name
        data_tests:
          - not_null
      - name: market_segment
        data_tests:
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']
      - name: nation_name
        data_tests:
          - not_null
      - name: total_orders
        data_tests:
          - not_null
      - name: customer_tier
        description: "{{ doc('customer_tier') }}"
        data_tests:
          - accepted_values:
              arguments:
                values: ['Platinum', 'Gold', 'Silver', 'No Orders']

  - name: gold_market_summary
    columns:
      - name: market_segment
        data_tests:
          - unique
          - not_null
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'MACHINERY', 'HOUSEHOLD']
      - name: total_orders
        data_tests:
          - not_null
      - name: total_revenue
        data_tests:
          - not_null
      - name: avg_order_value
        data_tests:
          - not_null

  - name: gold_nations_summary
    columns:
      - name: nation_name
        data_tests:
          - unique
          - not_null
      - name: total_orders
        data_tests:
          - not_null
      - name: total_revenue
        data_tests:
          - not_null
      - name: avg_order_value
        data_tests:
          - not_null